apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-app
  namespace: default
  labels:
    app: bad-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-app
  template:
    metadata:
      labels:
        app: bad-app
    spec:
      containers:
      - name: bad-app
        image: busybox
        command: ["/bin/sh", "-c", "echo 'Running...' && sleep 3600"]
        resources:
          limits:
            memory: "50Mi"
          requests:
            memory: "20Mi"
